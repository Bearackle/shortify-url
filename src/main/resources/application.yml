server:
    port: 8080
spring:
    application:
        name: shortify
    datasource:
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/shortify
        username: ${SHORTIFY_DB_USER:postgres}
        password: ${SHORTIFY_DB_PASSWORD:1}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
    flyway:
        enabled: true
        locations: classpath:db/migration
        url: jdbc:postgresql://${DB_HOST:localhost}:5432/shortify
        user: ${SHORTIFY_DB_USER:postgres}
        password: ${SHORTIFY_DB_PASSWORD:1}
    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=10000,expireAfterWrite=10m,recordStats
    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: 6379
            database: 0
            timeout: 2000ms
            lettuce:
                pool:
                    max-active: 20
                    max-idle: 10
                    min-idle: 5
                    max-wait: 1000ms



shortener:
    alphabet: ${ALPHABET_SHUFFLE}
    minLength: 8
